name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "output/tables/**"
      - "data/processed/phase5_risk_table.csv"
      - "data/processed/phase5_target_status.csv"
      - "scripts/export_site_data.py"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export tables to JSON for the site
        # Reads the already-committed output/tables/*.csv and data/processed/*.csv -
        # does not re-run the ChimeraX/MAFFT pipeline, just converts existing verified
        # tables to JSON. Pure stdlib, no extra install needed.
        run: python scripts/export_site_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
